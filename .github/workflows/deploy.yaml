name: CD

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: course.prafdin.ru
          port: 3200
          username: kali
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: |
            set -e
            cd /home/kali/catty-reminders-app || exit 1

            # Авторизация в GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Загрузка образа по тегу SHA текущего коммита
            echo "IMAGE_TAG=${{ github.sha }}" > .env.release

            sudo docker compose pull app || true

            # Чистый перезапуск стека без лишних прокидываний DEPLOY_REF в env хоста
            sudo docker compose down --remove-orphans || true
            sudo docker compose up -d

            # Хелсчек доступности
            for i in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:8181/login >/dev/null; then
                echo "App is healthy"
                exit 0
              fi
              echo "Waiting for app... ($i/30)"
              sleep 5
            done

            echo "App failed to start"
            sudo docker compose logs app
            exit 1
