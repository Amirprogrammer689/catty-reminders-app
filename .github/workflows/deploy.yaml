name: CD

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: course.prafdin.ru
          port: 3200
          username: kali
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: |
            set -e
            cd /home/kali/catty-reminders-app || exit 1

            # Обновляем локальный исходный код прямо на сервере
            git fetch origin
            git checkout lab4 || true
            git pull origin lab4 || true

            # Записываем хэш коммита в локальный файл .env для сборки compose
            echo "IMAGE_TAG=${{ github.sha }}" > .env

            # Чистый перезапуск стека с автоматической сборкой
            sudo docker compose down --remove-orphans || true
            sudo docker compose up -d --build

            # Цикл проверки доступности (Health Check)
            for i in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:8181/login >/dev/null; then
                echo "App is healthy"
                exit 0
              fi
              echo "Waiting for app... ($i/30)"
              sleep 5
            done

            echo "App failed to start"
            sudo docker compose logs app
            exit 1
