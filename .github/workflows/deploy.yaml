name: CD

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: course.prafdin.ru
          port: 3200
          username: kali
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: |
            set -e
            cd /home/kali/catty-reminders-app || exit 1

            # Авторизация в реестре пакетов GitHub Container Registry (GHCR)
            echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Загрузка обновленного Docker-образа приложения
            sudo env DEPLOY_REF=${{ github.sha }} docker compose pull app || true

            # Остановка старого и запуск нового мультиконтейнерного стека
            sudo env DEPLOY_REF=${{ github.sha }} docker compose down || true
            sudo env DEPLOY_REF=${{ github.sha }} docker compose up -d --remove-orphans

            # Цикл проверки доступности веб-сервиса (Health Check)
            for i in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:8181/login >/dev/null; then
                echo "App is healthy"
                exit 0
              fi
              echo "Waiting for app... ($i/30)"
              sleep 5
            done

            echo "App failed to start"
            sudo docker compose logs app
            exit 1
