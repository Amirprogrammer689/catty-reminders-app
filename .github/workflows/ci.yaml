name: CI

on:
  push:
    branches:
      - '**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # --prefer-binary мгновенно ставит готовые пакеты без сборки из исходников
          pip install -r requirements.txt --prefer-binary --no-cache-dir
          python -m playwright install chromium --with-deps

      - name: Deploy & Restart via systemd (Local Simulation / SSH)
        run: |
          # Копируем созданный unit-файл в системную директорию systemd
          sudo cp catty.service /etc/systemd/system/catty.service

          # Перезагружаем конфигурацию демона, чтобы он увидел новый сервис
          sudo systemctl daemon-reload

          # Включаем автозапуск и перезапускаем приложение
          sudo systemctl enable catty.service
          sudo systemctl restart catty.service

      - name: Health Check
        run: |
          # Контрольное ожидание запуска сервиса
          for i in {1..30}; do
            curl --fail --silent http://127.0.0.1:8181/login >/dev/null && exit 0
            sleep 1
          done
          echo "Application failed to start via systemd!"
          sudo systemctl status catty.service
          exit 1

      - name: Run tests
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python -m pytest -v --browser chromium --junitxml=test_result.xml tests

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test_result
          path: test_result.xml
